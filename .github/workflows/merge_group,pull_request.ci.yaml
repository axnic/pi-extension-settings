# yaml-language-server: $schema=https://www.schemastore.org/github-action.json
---
# =============================================================================
# CI — Pull-request & merge-queue quality gate
# =============================================================================
# Validates every PR (and merge-queue entry) before it lands on main:
#
#   lint        — Trunk (TypeScript/JS/Markdown/YAML/actions, GitHub annotations)
#   commitlint  — Conventional Commits on every commit in the PR
#   typecheck   — tsc (extension + SDK via project references)
#   test        — Vitest (extension + SDK)
#
# All tools are installed via mise so exact versions match local development.
# See mise.toml for pinned versions.
# =============================================================================

name: PR & Merge-Queue Quality Gate

on:
  merge_group: {}
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Minimal top-level permissions — each job declares what it needs.
permissions: {}

jobs:
  # ---------------------------------------------------------------------------
  # lint — Trunk (covers TS/JS/Markdown/YAML/actions via .trunk/trunk.yaml)
  # ---------------------------------------------------------------------------
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Installs every tool listed in mise.toml (Node, pnpm, Trunk, …).
      # The cache key changes only when mise.toml or the lock file changes.
      - name: 🔧 Install tools via mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          cache: true

      # ── Trunk ──────────────────────────────────────────────────────────────
      # --reporter=github emits ::error:: annotation commands that GitHub renders
      # as inline PR diff comments — same tool, same config as `mise run lint`.
      - name: ⚡️ Lint with Trunk
        uses: trunk-io/trunk-action@bf81325059d2534b31df5365182237788c5e0338
        with:
          args: check --ci --all
        env:
          TRUNK_TELEMETRY: off

  # ---------------------------------------------------------------------------
  # commitlint — every commit in the PR must follow Conventional Commits
  # ---------------------------------------------------------------------------
  commitlint:
    name: ✉️ Commit Messages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Full history is needed to compare base..head SHA range.
      - name: ⬇️ Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: 🔧 Install tools via mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          cache: true

      - name: 💾 Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ Validate commit messages
        run: |
          pnpm exec commitlint \
            --from ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }} \
            --to   ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }} \
            --verbose

  # ---------------------------------------------------------------------------
  # typecheck — tsc (extension + SDK via project references)
  # ---------------------------------------------------------------------------
  typecheck:
    name: 🏷️ Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🔧 Install tools via mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          cache: true

      - name: 💾 Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ Type-check extension
        run: tsc --noEmit -p tsconfig.json

      - name: ✅ Type-check SDK (builds extension declarations first)
        run: mise run build:extension && tsc --noEmit -p sdk/tsconfig.json

  # ---------------------------------------------------------------------------
  # test — Vitest (extension + SDK)
  # ---------------------------------------------------------------------------
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🔧 Install tools via mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          cache: true

      - name: 💾 Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run all tests
        run: pnpm test
