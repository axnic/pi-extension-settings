---
# =============================================================================
# Publish SDK — push @axnic/pi-extension-settings-sdk to npm
# =============================================================================
# Triggered automatically when a GitHub Release is published (typically by the
# workflow_dispatch.release.yaml workflow).
#
# Security model — SLSA Build L2:
#   • Build runs on GitHub-hosted infrastructure (hosted build service).
#   • `npm publish --provenance` requests a GitHub OIDC token and attaches a
#     signed SLSA provenance attestation to the package on the npm registry.
#     Consumers can verify it with: npm audit signatures
#   • id-token: write is the only extra privilege beyond reading source.
#
# See docs/slsa-compliance.md for the full compliance status and the gap
# analysis toward SLSA Build L3.
#
# Prerequisites:
#   • A repository secret named NPM_TOKEN containing a Granular Access Token
#     (npm) scoped to @axnic/pi-extension-settings-sdk with "Read and write".
#   • A GitHub environment named "npm" (Settings → Environments) for deployment
#     protection rules and secret scoping.
# =============================================================================

name: 📦 Publish SDK to npm

on:
  release:
    types: [published]

permissions: {}

jobs:
  publish:
    name: 📦 Publish @axnic/pi-extension-settings-sdk
    runs-on: ubuntu-latest

    # Scoped environment enables deployment protection rules and tracks
    # releases in the GitHub UI.
    environment:
      name: npm
      url: https://www.npmjs.com/package/@axnic/pi-extension-settings-sdk

    permissions:
      contents: read
      # Required by `npm publish --provenance` to request a GitHub OIDC token.
      id-token: write

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Pin to the exact release tag so the artefact and the provenance
          # commit SHA are guaranteed to match.
          ref: ${{ github.event.release.tag_name }}

      - name: 🔧 Install tools via mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          cache: true

      - name: 💾 Cache npm dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-sdk-${{ hashFiles('sdk/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-sdk-

      - name: 📦 Install SDK dependencies
        run: cd sdk && npm ci

      # ── Pre-publish validation ─────────────────────────────────────────────
      # Mirrors the local prepublishOnly hook (typecheck → test → build).
      - name: 🏷️ Type-check SDK
        run: cd sdk && npm run typecheck

      - name: 🧪 Run SDK tests
        run: cd sdk && npm run test

      - name: 🏗️ Build SDK
        run: cd sdk && npm run build

      # ── Authenticate with npm ──────────────────────────────────────────────
      - name: 🔑 Configure npm authentication
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Publish ───────────────────────────────────────────────────────────
      # --provenance: attach a signed SLSA L2 provenance attestation.
      #               Requires the id-token: write permission declared above.
      # --access public: @axnic scope is public (mirrors sdk/package.json).
      - name: 🚀 Publish with provenance (SLSA L2)
        run: cd sdk && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
