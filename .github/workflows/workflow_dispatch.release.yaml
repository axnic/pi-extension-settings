# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
# =============================================================================
# Release — create a versioned release from the GitHub UI
# =============================================================================
# Triggered manually via Actions → Release → Run workflow.
#
# What it does:
#   1. Computes the next version automatically from the last git tag
#   2. Bumps the version in package.json and sdk/package.json
#   3. Runs typecheck + tests + build
#   4. Commits the version bump with a Conventional Commit message
#   5. Creates and pushes a v<version> git tag
#   6. Generates polished release notes via GitHub Copilot (GitHub Models)
#   7. Opens a GitHub Release (--prerelease for RC, --latest for stable)
#
# Bump types:
#   patch / minor / major   → stable release computed from the last stable tag
#   rc-patch / rc-minor / rc-major → release candidate; increments the RC
#                             counter if one already exists for the target
#
# Release note scope:
#   RC     → commits since the last tag (RC or stable)
#   stable → commits since the last stable (non-RC) tag, so RC commits
#            are included in the final release summary
#
# Publishing to npm is handled by release.publish.yaml, triggered
# automatically when this release is published.
#
# Prerequisites:
#   • GITHUB_TOKEN must be allowed to push directly to the default branch.
#     If branch-protection rules require PR reviews, store a fine-grained PAT
#     with "Contents: Read and write" as RELEASE_TOKEN and replace
#     `secrets.GITHUB_TOKEN` with `secrets.RELEASE_TOKEN` in the checkout step.
# =============================================================================

name: 🚀 Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - rc-patch
          - rc-minor
          - rc-major
      notes:
        description: "Release notes override (leave blank to auto-generate via Copilot)"
        required: false
        type: string

permissions: {}

jobs:
  release:
    name: 🚀 Create release (${{ inputs.bump }})
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Replace with secrets.RELEASE_TOKEN if branch protection is active.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔧 Install tools via mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          cache: true

      - name: 💾 Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Compute next version ───────────────────────────────────────────────
      - name: 🔖 Compute next version and changelog range
        id: version
        run: |
          BUMP="${{ inputs.bump }}"

          # All semver-style tags, newest first
          ALL_TAGS=$(git tag -l 'v[0-9]*' --sort=-version:refname)

          # Last stable tag (no -rc. suffix); last tag of any kind
          LAST_STABLE=$(printf '%s\n' "$ALL_TAGS" | grep -v -- '-rc\.' | head -1)
          LAST_TAG=$(printf '%s\n' "$ALL_TAGS" | head -1)

          [[ -z "$LAST_STABLE" ]] && LAST_STABLE="v0.0.0"
          [[ -z "$LAST_TAG" ]]    && LAST_TAG="v0.0.0"

          VER="${LAST_STABLE#v}"
          MAJOR="${VER%%.*}"; REST="${VER#*.}"; MINOR="${REST%%.*}"; PATCH="${REST#*.}"

          # Returns the next RC version for a given target (e.g. "1.3.0").
          # Increments the existing RC counter if an RC for that target exists,
          # otherwise starts at rc.1.
          compute_rc() {
            local target="$1"
            local existing
            existing=$(printf '%s\n' "$ALL_TAGS" | grep "^v${target}-rc\." | head -1)
            if [[ -n "$existing" ]]; then
              local n; n=$(printf '%s' "$existing" | grep -oE '[0-9]+$')
              printf '%s-rc.%d' "$target" "$((n + 1))"
            else
              printf '%s-rc.1' "$target"
            fi
          }

          case "$BUMP" in
            patch)    NEW_VER="${MAJOR}.${MINOR}.$((PATCH + 1))"                ; PREV_TAG="$LAST_STABLE" ;;
            minor)    NEW_VER="${MAJOR}.$((MINOR + 1)).0"                       ; PREV_TAG="$LAST_STABLE" ;;
            major)    NEW_VER="$((MAJOR + 1)).0.0"                              ; PREV_TAG="$LAST_STABLE" ;;
            rc-patch) NEW_VER=$(compute_rc "${MAJOR}.${MINOR}.$((PATCH + 1))") ; PREV_TAG="$LAST_TAG" ;;
            rc-minor) NEW_VER=$(compute_rc "${MAJOR}.$((MINOR + 1)).0")         ; PREV_TAG="$LAST_TAG" ;;
            rc-major) NEW_VER=$(compute_rc "$((MAJOR + 1)).0.0")                ; PREV_TAG="$LAST_TAG" ;;
          esac

          { echo "version=${NEW_VER}"; echo "prev_tag=${PREV_TAG}"; } >> "$GITHUB_OUTPUT"
          echo "ℹ️  New version  : v${NEW_VER}"
          echo "ℹ️  Changelog from : ${PREV_TAG}"

      # ── Collect commit log ─────────────────────────────────────────────────
      # Captured before the version-bump commit so it only contains meaningful
      # changes. Fields are separated by ASCII unit-separator (0x1F) and
      # records by record-separator (0x1E) to survive arbitrary commit text.
      # The github-script step resolves PR numbers and authors from this data.
      - name: 📋 Collect structured commit log for release notes
        run: |
          PREV="${{ steps.version.outputs.prev_tag }}"
          RANGE="${PREV}..HEAD"
          [[ "$PREV" == "v0.0.0" ]] && RANGE="HEAD"

          git log --no-merges \
            --format="%H%x1f%s%x1f%b%x1f%an%x1f%ae%x1e" \
            "$RANGE" > git-commits.txt

          echo "--- Collected $(git log --no-merges --oneline "$RANGE" | wc -l | tr -d ' ') commit(s) (${RANGE}) ---"

      # ── Bump versions ──────────────────────────────────────────────────────
      # --no-git-tag-version: tag is created manually after tests pass.
      - name: 🔖 Bump versions in package.json files
        run: |
          pnpm version ${{ steps.version.outputs.version }} --no-git-tag-version
          pnpm -C sdk version ${{ steps.version.outputs.version }} --no-git-tag-version

      # ── Build & validate ───────────────────────────────────────────────────
      - name: 🏷️ Type-check SDK
        run: tsc --noEmit -p tsconfig.json && mise run build:extension && tsc --noEmit -p sdk/tsconfig.json

      - name: 🧪 Run extension tests
        run: pnpm test

      - name: 🏗️ Build
        run: mise run build

      # ── Commit, tag, push ──────────────────────────────────────────────────
      - name: 🔧 Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 📝 Commit version bump
        run: |
          git add package.json sdk/package.json
          git commit -m "chore(tooling): Bump version to v${{ steps.version.outputs.version }}"

      - name: 🏷️ Create and push tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push
          git push origin "v${{ steps.version.outputs.version }}"


      # ── Generate release notes via Copilot ────────────────────────────────
      - name: 🤖 Generate release notes via GitHub Copilot
        id: release-notes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const VERSION = '${{ steps.version.outputs.version }}';

            const inputNotes = `${{ inputs.notes }}`.trim();
            if (inputNotes) {
              fs.writeFileSync('release-notes.md', inputNotes);
              return;
            }

            // ── Load prompt template from repository asset ──────────────────
            const SYSTEM = fs.readFileSync(
              '.github/workflows/assets/release-notes-prompt.md',
              'utf8',
            );

            // ── Parse structured commit data ────────────────────────────────
            // Records separated by 0x1E, fields by 0x1F (written by git log).
            const raw = fs.readFileSync('git-commits.txt', 'utf8');
            const commits = raw
              .split('\x1e')
              .filter(r => r.trim())
              .map(r => {
                const [sha = '', subject = '', body = '', authorName = '', authorEmail = ''] =
                  r.split('\x1f');
                return {
                  sha:         sha.trim(),
                  subject:     subject.trim(),
                  body:        body.trim(),
                  authorName:  authorName.trim(),
                  authorEmail: authorEmail.trim(),
                };
              })
              .filter(c => c.sha.length === 40);

            if (commits.length === 0) {
              core.warning('No commits found in range — writing minimal release notes.');
              fs.writeFileSync('release-notes.md', `## What's new in v${VERSION}\n\nNo changes recorded.\n`);
              return;
            }

            // ── Resolve associated PRs in parallel (best-effort) ───────────
            const prResults = await Promise.all(
              commits.map(async c => {
                try {
                  const { data } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    commit_sha: c.sha,
                  });
                  const merged = data.find(p => p.merged_at);
                  return merged
                    ? { number: merged.number, url: merged.html_url, login: merged.user?.login }
                    : null;
                } catch {
                  return null;
                }
              }),
            );

            // ── Build structured context for the LLM ───────────────────────
            const commitLines = commits.map((c, i) => {
              const pr = prResults[i];
              const authorDisplay = pr?.login
                ? `${c.authorName} (@${pr.login})`
                : c.authorName;
              return [
                `sha: ${c.sha.slice(0, 7)}`,
                `subject: ${c.subject}`,
                c.body ? `body: ${c.body}` : null,
                `author: ${authorDisplay}`,
                pr ? `pr: #${pr.number} (${pr.url})` : 'pr: (none)',
                '---',
              ].filter(Boolean).join('\n');
            });
            const commitContext = commitLines.join('\n');

            // ── Call GitHub Copilot (GitHub Models) ─────────────────────────
            try {
              const res = await fetch('https://models.github.ai/inference/chat/completions', {
                method: 'POST',
                headers: {
                  Authorization: `Bearer ${{ secrets.GITHUB_TOKEN }}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'openai/gpt-5-mini',
                  messages: [
                    { role: 'system', content: SYSTEM },
                    {
                      role: 'user',
                      content: `Generate release notes for version v${VERSION}.\n\n${commitContext}`,
                    },
                  ],
                  max_tokens: 1200,
                }),
              });

              if (res.ok) {
                const data = await res.json();
                fs.writeFileSync('release-notes.md', data.choices[0].message.content);
                core.info(`Release notes generated via GitHub Copilot (gpt-5-mini) from ${commits.length} commit(s).`);
                return;
              }
              core.warning(`GitHub Models API returned ${res.status}: ${await res.text()} — falling back.`);
            } catch (err) {
              core.warning(`GitHub Models API call failed (${err.message}) — falling back.`);
            }

            // ── Fallback: minimal formatted list ────────────────────────────
            const fallbackLines = commits.map((c, i) => {
              const pr = prResults[i];
              return `- ${c.subject}${pr ? ` ([#${pr.number}](${pr.url}))` : ''}`;
            });
            fs.writeFileSync(
              'release-notes.md',
              `## What's new in v${VERSION}\n\n${fallbackLines.join('\n')}\n`,
            );

      # ── Create GitHub Release ──────────────────────────────────────────────
      - name: 🚀 Create GitHub Release
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *"-rc."* ]]; then
            gh release create "$VERSION" \
              --title "$VERSION" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "$VERSION" \
              --title "$VERSION" \
              --notes-file release-notes.md \
              --latest
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
