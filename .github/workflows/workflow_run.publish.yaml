# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# =============================================================================
# Publish packages — push all workspace packages to npm
# =============================================================================
# Triggered automatically when the Release workflow completes successfully.
# The release is created as a draft by the Release workflow; this workflow
# publishes it only after npm publishing and asset upload succeed.
#
# Security model — SLSA Build L2:
#   • npm provenance via GitHub OIDC (--provenance)
#   • CycloneDX SBOMs generated per workspace package via Syft
#   • SBOMs and publish summary signed keylessly via cosign (Sigstore/Rekor)
#   • All signed artefacts attached to the GitHub Release
#
# Required environment: "npm" (deployment gate / protection rules)
# =============================================================================

name: Publish packages to npm

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions: {}

concurrency:
  group: npm-publish-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  # ── Validate ──────────────────────────────────────────────────────────────
  validate:
    name: ✅ Validate (typecheck · tests · build)
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: 🔧 Install tools via mise
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: 💾 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏷️ Type-check
        run: |
          tsc --noEmit -p tsconfig.json
          mise run build:extension
          tsc --noEmit -p sdk/tsconfig.json

      - name: 🧪 Run tests
        run: pnpm test

      - name: 🏗️ Build all
        run: mise run build

  # ── Publish ───────────────────────────────────────────────────────────────
  publish:
    name: 🚀 Publish all workspace packages
    if: github.event.workflow_run.conclusion == 'success'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/org/axnic
    permissions:
      contents: write # upload release assets
      id-token: write # OIDC → npm provenance

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: 🔖 Resolve release tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ -z "$TAG" ]]; then
            TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || true)
          fi
          if [[ -z "$TAG" ]]; then
            echo "::error::Unable to resolve a release tag for HEAD. This workflow was triggered via '${{ github.event_name }}', but the checked out commit is not exactly at a tag. Ensure the triggering run references a tagged commit."
            exit 1
          fi
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"

      - name: 🔧 Install tools via mise
        uses: jdx/mise-action@v2
        with:
          cache: false

      - name: 💾 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build all
        run: mise run build

      # ── SBOM generation ──────────────────────────────────────────────────
      - name: 🔧 Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: 🧾 Generate CycloneDX SBOMs
        run: |
          syft scan dir:. --exclude ./sdk -o cyclonedx-json=sbom-extension.json
          syft scan dir:sdk              -o cyclonedx-json=sbom-sdk.json

      # ── Publish ───────────────────────────────────────────────────────────
      # actions/setup-node writes a .npmrc that pnpm reads for registry and
      # auth configuration. Without it, pnpm has no registry context and
      # fails with ENEEDAUTH even when id-token: write is granted. No
      # NODE_AUTH_TOKEN is set so the OIDC trusted-publishers flow handles auth.
      - name: 🔧 Configure npm registry for pnpm
        uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org/"

      - name: 🚀 Publish all workspace packages
        run: |
          pnpm publish \
            --recursive \
            --provenance \
            --access public \
            --no-git-checks \
            --report-summary

      # ── Sign artefacts with cosign (keyless OIDC) ────────────────────────
      - name: 🔧 Install cosign
        uses: sigstore/cosign-installer@v3

      - name: ✍️ Sign SBOMs and publish summary
        run: |
          cosign sign-blob --yes \
            --output-signature sbom-extension.json.sig \
            --output-certificate sbom-extension.json.crt \
            sbom-extension.json
          cosign sign-blob --yes \
            --output-signature sbom-sdk.json.sig \
            --output-certificate sbom-sdk.json.crt \
            sbom-sdk.json
          cosign sign-blob --yes \
            --output-signature pnpm-publish-summary.json.sig \
            --output-certificate pnpm-publish-summary.json.crt \
            pnpm-publish-summary.json

      # ── Attach artefacts and publish release ─────────────────────────────
      - name: 📤 Attach artefacts to GitHub Release
        run: |
          gh release upload "${{ steps.tag.outputs.name }}" \
            sbom-extension.json \
            sbom-extension.json.sig \
            sbom-extension.json.crt \
            sbom-sdk.json \
            sbom-sdk.json.sig \
            sbom-sdk.json.crt \
            pnpm-publish-summary.json \
            pnpm-publish-summary.json.sig \
            pnpm-publish-summary.json.crt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Publish GitHub Release
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if [[ "$TAG" == *"-rc."* ]]; then
            gh release edit "$TAG" --draft=false --prerelease
          else
            gh release edit "$TAG" --draft=false --latest
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
